name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show uv Python
        run: uv run --locked --python ${{ matrix.python-version }} --group dev python --version

      - name: Lint
        run: uv run --locked --python ${{ matrix.python-version }} --group dev ruff check .

      - name: Test
        run: uv run --locked --python ${{ matrix.python-version }} --group dev python -m pytest -q

      - name: Build package
        run: uv build --python ${{ matrix.python-version }}
